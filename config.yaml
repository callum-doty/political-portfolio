# ─── Backtest Configuration ───────────────────────────────────────────────────
# All model parameters and pipeline toggles live here.
# Scripts read this file via src/backtest/config.py — nothing is hard-coded.

# ─── Data paths ───────────────────────────────────────────────────────────────
paths:
  raw:
    fec:              data/raw/fec
    mit:              data/raw/mit_elections
    cook:             data/raw/cook_pvi
    census:           data/raw/census
    rcp:              data/raw/rcp
    presidential:     data/raw/presidential
    bulk_all:         data/raw/bulk_all
    ie_comprehensive: data/raw/independent_expenditure
    generic_ballot:   data/raw/generic_ballot
    candidate_committee_linkage: data/raw/candidate_committee_linkage
  processed:      data/processed
  outputs:        outputs

# ─── Universe filters ─────────────────────────────────────────────────────────
universe:
  min_total_spend:        100_000          # at least one candidate above this
  exclude_states:         ["AK"]           # ranked-choice incompatibility
  competitive_ratings:                     # used for MSG rank-correlation test
    - "Toss-Up"
    - "Lean D"
    - "Lean R"
  # Races where redistricting produced fundamentally new seats — flag but do not exclude.
  # 2024 cases: NC entire map redrawn by Republicans (2023 ruling); LA-06 court-ordered
  # new majority-Black district; AL-02 reconfigured by court order; NY court-ordered maps.
  # These races have no stable historical precedent — treat allocation signals with caution.
  redistricting_flag_districts:
    # North Carolina — entirely new 2024 map (Republican gerrymander, Oct 2023)
    - "NC-01"
    - "NC-06"
    - "NC-07"
    - "NC-10"
    - "NC-13"
    - "NC-14"
    # Louisiana — court-ordered second Black-majority district (new seat)
    - "LA-06"
    # Alabama — court-ordered reconfiguration of majority-Black district
    - "AL-02"
    # New York — court-imposed new maps (new competitive districts)
    - "NY-03"
    - "NY-04"
    - "NY-17"
    - "NY-18"
    - "NY-22"

# ─── Historical panel ─────────────────────────────────────────────────────────
panel:
  cycles:   [2012, 2014, 2016, 2018, 2020, 2022]
  min_repeat_challenger_pairs: 40          # below this, widen tau

# ─── Generic ballot (2024 pre-election RCP average, D − R) ───────────────────
generic_ballot_2024: -1.2
generic_ballot_by_cycle:
  2012:  1.2
  2014: -5.8
  2016:  1.3
  2018:  8.6
  2020:  7.0
  2022: -1.0
  2024: -1.2
  # 2026 is NOT a final pre-election value like the cycles above — the
  # election hasn't happened yet. This is a LIVE point-estimate (21-day
  # trailing average of raw polls from scripts/fetch_polling.py / VoteHub),
  # captured 2026-07-07, meant to be refreshed at each periodic re-run of
  # the dynamic/ live pipeline, not varied within a single run. Per the
  # Paper II implementation plan's Phase 4A finding, this is a legitimate
  # single-scenario input (same role as the other per-cycle constants
  # above) — it is NOT the same as feeding a continuously time-varying GB
  # series into coef.alpha3 within one optimization, which remains
  # unsupported by the estimation. Update this value (and the comment
  # date) whenever scripts/fetch_polling.py is re-run for a fresh live
  # snapshot.
  2026: 5.02

# ─── Spending response surface ────────────────────────────────────────────────
# β_RC is estimated from the historical panel and carried forward.
# These are populated by scripts/run_estimation.py and stored in
# data/processed/beta_rc.json; the values below are placeholders until estimated.
beta_rc:
  estimate: null
  se:       null
  n_pairs:  null

# ─── Uncertainty propagation ─────────────────────────────────────────────────
uncertainty:
  n_draws:         1000
  credible_interval: 0.83                  # 83% CI (≈ ±1 SE)

# ─── Optimizer ────────────────────────────────────────────────────────────────
optimizer:
  # Risk-aversion levels.  γ_mid calibrated so 1 SD variance costs 0.5 seats;
  # γ_high calibrated so 1 SD costs 1.0 seat.  Set after σ[Seats] is known.
  gamma_values: [0.0, null, null]          # [risk_neutral, mid, high] — nulls filled post-estimation
  cap_regimes:  [0.05, 0.10, 0.15]        # fraction of total budget
  min_allocation: 0.0                      # no negative spending

# ─── Validation gate thresholds ───────────────────────────────────────────────
validation:
  spending_completeness_min: 0.80          # ~36 safe D seats have no R spend → one-sided OK
  margin_model_r2_pass:      0.40
  margin_model_r2_stretch:   0.60
  sigma_ordering_frac_min:   0.00          # D challengers run in R-leaning districts (selection
                                           # effect) → lower σ; empirical incumb≈open>chall is correct
  brier_tolerance:           0.05          # model Brier ≤ Cook Brier + 0.05

# ─── Cook rating → win probability conversion ─────────────────────────────────
cook_win_probs:
  "Safe D":    0.97
  "Likely D":  0.85
  "Lean D":    0.70
  "Toss-Up":   0.50
  "Lean R":    0.30
  "Likely R":  0.15
  "Safe R":    0.03

# ─── Output ───────────────────────────────────────────────────────────────────
outputs:
  material_divergence_threshold: 0.01     # |difference| > 1% of budget = material
  concentration_flag_threshold:  0.15     # flag any race receiving > 15% of budget

# ─── 2026 live budget projection (Paper II §7.1) ──────────────────────────────
# BUDGET_2026 is DERIVED, not typed here directly: see
# backtest.model.budget.estimate_budget_2026(), which averages the 2018 and
# 2022 midterm party-controlled budgets (each computed live from
# build_universe(), same formula as scripts/run_backtest.py's party_budget),
# inflated to 2026-equivalent dollars via BLS CPI-U (series CUUR0000SA0).
# The raw CPI index values below are genuine external inputs (BLS data this
# repo does not itself fetch) -- not re-derivable from anything else here --
# so they are the one thing in this block that must be hand-updated when a
# newer CPI release changes them. Previously this whole derivation existed
# only as prose in docs/paper2_draft.md §7.1, with BUDGET_2026 hardcoded as
# an independent literal in scripts/plot_2026_live_allocation.py (Paper III
# audit, 2026-07-16).
budget_2026_projection:
  base_cycles: [2018, 2022]      # party-controlled budgets averaged, each own-cycle-CPI-inflated
  cpi_nov_2018: 252.038          # BLS CPI-U, series CUUR0000SA0
  cpi_nov_2022: 297.711
  cpi_nov_2025: 324.122
  trailing_yoy_rate: 0.0425      # as of May 2026, applied to Nov 2025 CPI to project Nov 2026

# ─── Dynamic allocation (Paper II — src/backtest/dynamic/) ───────────────────
# Sequential/receding-horizon architecture. Paper I above is unaffected by
# this block. See docs/paper2_draft.md §3.3 for f_baseline (EMA) and §3.2
# for the commitment-source (L_t) research/operational mode distinction.
dynamic:
  ema_lambda: 0.7                # f_baseline smoothing constant (paper §3.3)
  reporting_cadence: "biweekly"  # "biweekly" | "fec_quarterly" (dynamic/periods.py)
  commitment_mode: "zero"        # "zero" | "operational" | "research_stub" (dynamic/ledger.py)
  period_days: 14                # biweekly grid spacing (dynamic/periods.py's biweekly_periods()) --
                                  # single source of truth; previously re-typed as an independent
                                  # literal in scripts/simulate_and_validate.py and
                                  # scripts/solve_bellman_lsm.py (Paper III audit, 2026-07-16)
  election_day_2026: "2026-11-03"  # official 2026 House general election date -- single source
                                    # of truth; previously re-typed independently in
                                    # scripts/solve_bellman_lsm.py and scripts/estimate_gb_ou_drift.py
